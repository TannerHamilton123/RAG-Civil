<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Civil</title>
</head>
<body>
    <header>RAG Civil Assistant</header>

<div class="layout">

  <div class="upload-panel">
    <h2>Upload Documents</h2>
  </div>

  <div class="chat-panel">
    <h2>Chat</h2>
        <div class="chat-panel">

            <div id="chat-messages">
            </div>

            <div class="chat-input-area">
                <textarea id="user-input" placeholder="Ask a question about your documents..."></textarea>
                <button onclick="sendMessage()">Send</button>
            </div>

        </div>
  </div>

</div>

</body>
</html>


<script>
    async function sendMessage() {

        //Takes the message typed by user, and puts it in a new div within chat messages
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        var container = document.getElementById('chat-messages');

        const userMessage = document.createElement('div');
        userMessage.className = 'message-user';
        userMessage.textContent = text;
        
        container.appendChild(userMessage);

        input.value = '';

        const response = await fetch('http://127.0.0.1:8000/ask_question', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: text })
        });

        const data = await response.json();

        const aiMsg = document.createElement('div');
        aiMsg.className = 'message-ai';
        aiMsg.textContent = data.answer;
        container.appendChild(aiMsg);
        }
</script>
