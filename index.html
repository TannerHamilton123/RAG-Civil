<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Civil</title>
</head>
<body>
    <header>RAG Civil Assistant</header>

<div class="layout">

  <div class="upload-panel">
    <h2>Upload Documents</h2>
        <form>
            <label for="file-picker">Choose a file to upload:</label>
            <input type="file" id="file-picker" name="uploaded_file">
            <button OnClick="uploadFile()" type="button">Upload</button>
        </form>
        <div id = "uploaded_document_list">
        </div>

        

  </div>





  <div class="chat-panel">
    <h2>Chat</h2>
        <div class="chat-panel">

            <div id="chat-messages">
            </div>

            <div class="chat-input-area">
                <textarea id="user-input" placeholder="Ask a question about your documents..."></textarea>
                <button onclick="sendMessage()">Send</button>
            </div>

        </div>
  </div>

</div>

</body>
</html>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>

    var uploaded_documents=[]
    async function sendMessage() {

        //Takes the message typed by user, and puts it in a new div within chat messages
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        var container = document.getElementById('chat-messages');

        const userMessage = document.createElement('div');
        userMessage.className = 'message-user';
        userMessage.textContent = text;
        
        container.appendChild(userMessage);

        input.value = '';
        //Gets response from FastAPI, sending question to Claude
        const response = await fetch('http://127.0.0.1:8000/ask_question', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: text })
        });

        //Recieves answer from Claude
        const data = await response.json();
        //Formats Claude answer and adds to html
        const aiMsg = document.createElement('div');
        aiMsg.className = 'message-ai';
        aiMsg.innerHTML = marked.parse(data.answer);
        container.appendChild(aiMsg);
        }



    async function uploadFile() {
        //populate uploaded_document_list with new file
        var container = document.getElementById('uploaded_document_list');
        var uploaded_file = document.getElementById('file-picker').files[0];
        const uploaded_document = document.createElement('li');
        uploaded_document.textContent = uploaded_file.name;
        container.appendChild(uploaded_document);

        //FormData is used because we are uploading a file
        const formData = new FormData();
        formData.append('file', uploaded_file);
        formData.append('name', uploaded_file.name);

        //Send file to FastAPI
        const response = await fetch('http://127.0.0.1:8000/upload_file', {
            method: 'POST',
            body: formData
        });
    }
</script>
